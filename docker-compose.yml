services:
  mongodb:
    image: mongo:6.0.27
    container_name: aikido-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    networks:
      - aikido-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aikido-api
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017/aikido?authSource=admin
      - API_USER=admin
      - API_PASS=password
    depends_on:
      - mongodb
    networks:
      - aikido-network

volumes:
  mongodb_data:


networks:
  aikido-network:
    external: true
